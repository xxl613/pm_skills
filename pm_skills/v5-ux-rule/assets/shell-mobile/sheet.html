<!doctype html>
<!-- 页面原型 C-m · 移动端底部弹层壳层（H5 375×812）＝ 桌面「C 抽屉」的移动对应物
     结构忠于 Figma「大平台设计-UI」教师端 app 底部面板范式（file ljg4eVP3elzzx5b2Q8FYdI：
       动作面板见 56301:11808「删除/取消」，内容面板见 56301:12470 工具界面）：
       对话流基座（同 shell-mobile/chat-flow.html，置灰遮罩下）+ 底部弹层[顶部圆角 16，
       三段式：标题+关闭 / 内容 / 底部操作 + 安全区]。
     两种变体（修饰类，新页 copy 后二选一，勿用 JS 切换——一页一态）：
       .v5m-sheet--half   半屏内容弹层（默认，≈60% 高）：详情 / 表单 / 列表选择
       .v5m-sheet--action 动作面板：纵向按钮列表（危险项红字）+ 分隔 + 取消
     桌面端对应壳层：shell/drawer.html（1/3 屏）· shell/drawer-half.html（半屏）。 -->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>V5 · 移动底部弹层 sheet</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
    font-family: var(--v5-font-family); color: var(--v5-color-text); background: var(--v5-color-fill); }

  /* ================= 手机画板（375×812） ================= */
  .v5m-screen { width: var(--v5m-viewport); min-height: var(--v5m-screen-min); background: var(--v5-color-surface);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    border: 1px solid var(--v5-color-border); }

  /* ===== 基座：对话流（同 chat-flow，处于遮罩下，静态呈现即可） ===== */
  .v5m-statusbar { height: var(--v5m-statusbar-height); flex: none; display: flex; align-items: center;
    justify-content: space-between; padding: 0 var(--v5m-page-pad); font-size: var(--v5-font-size-caption);
    font-weight: 600; background: var(--v5-color-surface); }
  .v5m-statusbar__icons { display: flex; gap: 4px; align-items: center; }
  .v5m-topbar { height: var(--v5m-topbar-height); flex: none; display: flex; align-items: center;
    padding: 0 var(--v5-space-2); background: var(--v5-color-surface); }
  .v5m-topbar__title { flex: 1; text-align: center; font-size: var(--v5m-font-size-title);
    line-height: var(--v5m-line-height-title); font-weight: 600; }
  .v5m-iconbtn { width: 32px; height: 32px; flex: none; display: grid; place-items: center; border: none;
    background: transparent; border-radius: var(--v5-radius-md); color: var(--v5-color-text); }
  .v5m-timeline { flex: 1; overflow-y: auto; padding: var(--v5-space-4) var(--v5m-page-pad);
    display: flex; flex-direction: column; gap: var(--v5-space-4); }
  .v5m-msg-ai { display: flex; gap: var(--v5-space-2); }
  .v5m-msg-ai__avatar { width: 36px; height: 36px; flex: none; border-radius: 50%;
    background: var(--v5-color-fill); border: 1px solid var(--v5-color-border); }
  .v5m-msg-ai__bubble { align-self: flex-start; max-width: 247px; background: var(--v5-color-bg);
    border-radius: var(--v5-radius-md); padding: var(--v5-space-3);
    font-size: var(--v5-font-size-body); line-height: var(--v5m-line-height-body); }

  /* ===== 遮罩 + 底部弹层 ===== */
  .v5m-mask { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); }
  .v5m-sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--v5-color-surface);
    border-radius: var(--v5-radius-lg) var(--v5-radius-lg) 0 0; display: flex; flex-direction: column; }
  .v5m-sheet--half { height: 60%; }

  /* 三段式：标题+关闭 / 内容 / 底部操作 */
  .v5m-sheet__hd { flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: var(--v5-space-4) var(--v5m-page-pad) var(--v5-space-3); }
  .v5m-sheet__title { font-size: var(--v5m-font-size-title); line-height: var(--v5m-line-height-title); font-weight: 600; }
  .v5m-sheet__bd { flex: 1; overflow-y: auto; padding: 0 var(--v5m-page-pad);
    display: flex; flex-direction: column; gap: var(--v5-space-3); }
  .v5m-sheet__ft { flex: none; padding: var(--v5-space-3) var(--v5m-page-pad) 0; }
  /* 底部主操作：品牌蓝胶囊通栏（页面级 CTA） */
  .v5m-cta { height: 44px; width: 100%; border: none; border-radius: var(--v5-radius-pill);
    background: var(--v5-color-brand); color: #fff; font-size: var(--v5-font-size-body); font-weight: 600;
    font-family: inherit; }

  /* 内容示例：可选列表项（业务内容按需替换） */
  .v5m-option { display: flex; align-items: center; gap: var(--v5-space-3); background: var(--v5-color-bg);
    border-radius: var(--v5-radius-md); padding: var(--v5-space-3); }
  .v5m-option__ico { width: 36px; height: 36px; flex: none; border-radius: var(--v5-radius-sm);
    background: var(--v5-color-info-bg); }
  .v5m-option__bd { flex: 1; min-width: 0; }
  .v5m-option__title { font-size: var(--v5-font-size-caption); line-height: 20px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .v5m-option__meta { font-size: 12px; line-height: 18px; color: var(--v5-color-text-secondary); }

  /* 动作面板变体（.v5m-sheet--action 时用，此处仅给结构参考）：
     .v5m-action-item { height:56px; 居中; font-size:body; }
     危险项加 color: var(--v5-color-error)；「取消」与上方用 8px 灰带（--v5-color-bg）分隔。 */

  .v5m-safe { height: var(--v5m-safe-bottom); flex: none; display: grid; place-items: center; }
  .v5m-safe::after { content: ""; width: 134px; height: 5px; border-radius: var(--v5-radius-pill);
    background: var(--v5-color-text); }
  svg { display: block; }
</style>
</head>
<body>
  <div class="v5m-screen">
    <!-- ===== 基座：对话流（遮罩下的当前页面） ===== -->
    <div class="v5m-statusbar">
      <span>9:41</span>
      <span class="v5m-statusbar__icons"><svg width="46" height="12" viewBox="0 0 46 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="currentColor"/><rect x="5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="10" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/><path d="M20 4c2-2 6-2 8 0M22 7c1-1 3-1 4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="33" y="1.5" width="11" height="9" rx="2" stroke="currentColor" stroke-width="1"/><rect x="34.5" y="3" width="7" height="6" rx="1" fill="currentColor"/></svg></span>
    </div>
    <header class="v5m-topbar">
      <button class="v5m-iconbtn" aria-label="返回"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4 6.5 10l6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <span class="v5m-topbar__title">V5 小管家</span>
      <button class="v5m-iconbtn" aria-label="更多"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="5" cy="10" r="1.4" fill="currentColor"/><circle cx="10" cy="10" r="1.4" fill="currentColor"/><circle cx="15" cy="10" r="1.4" fill="currentColor"/></svg></button>
    </header>
    <div class="v5m-timeline">
      <div class="v5m-msg-ai">
        <div class="v5m-msg-ai__avatar"></div>
        <div class="v5m-msg-ai__bubble">需要补充材料的话，从下面选一份文件继续吧。</div>
      </div>
    </div>

    <!-- ===== 遮罩 + 底部弹层（本页的「态」= 弹层展开） ===== -->
    <div class="v5m-mask"></div>
    <div class="v5m-sheet v5m-sheet--half">
      <!-- SLOT: 弹层标题（含关闭） -->
      <div class="v5m-sheet__hd">
        <span class="v5m-sheet__title">弹层标题</span>
        <button class="v5m-iconbtn" aria-label="关闭"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5 5 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      </div>
      <!-- SLOT: 弹层内容（详情 / 表单 / 列表选择） -->
      <div class="v5m-sheet__bd">
        <div class="v5m-option">
          <span class="v5m-option__ico"></span>
          <span class="v5m-option__bd">
            <span class="v5m-option__title">列表项标题</span>
            <span class="v5m-option__meta">辅助说明 · meta</span>
          </span>
        </div>
        <div class="v5m-option">
          <span class="v5m-option__ico"></span>
          <span class="v5m-option__bd">
            <span class="v5m-option__title">列表项标题</span>
            <span class="v5m-option__meta">辅助说明 · meta</span>
          </span>
        </div>
      </div>
      <!-- SLOT: 弹层底部操作（页面级 CTA 品牌蓝通栏） -->
      <div class="v5m-sheet__ft">
        <button class="v5m-cta">确定</button>
      </div>
      <div class="v5m-safe"></div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<!-- 页面原型 A-m · 移动端首页/门户壳层（H5 375×812）
     结构忠于 Figma「大平台设计-UI」教师端 app 首页 56301:15219（file ljg4eVP3elzzx5b2Q8FYdI）：
       模拟状态栏(44) → 顶栏(44: logo+产品名+右操作) → 滚动内容[统一首页群像 → 快捷入口行 → 区块标题 → 卡片列表]
       → 底部 TabBar(49) + Home Indicator 安全区(34)。
     视觉走 V5 base 令牌（项目色由 theme.css 覆盖）；结构为该 Figma 实测。
     新页 copy 本文件，只改 TabBar 激活项与内容槽位。桌面端对应壳层：shell/home-portal.html。 -->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>V5 · 移动门户 portal</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
    font-family: var(--v5-font-family); color: var(--v5-color-text); background: var(--v5-color-fill); }

  /* ================= 手机画板（375×812，居中展示） ================= */
  .v5m-screen { width: var(--v5m-viewport); min-height: var(--v5m-screen-min); background: var(--v5-color-bg);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    border: 1px solid var(--v5-color-border); }

  /* 模拟状态栏（原型演示态，上线后为系统/微信原生） */
  .v5m-statusbar { height: var(--v5m-statusbar-height); flex: none; display: flex; align-items: center;
    justify-content: space-between; padding: 0 var(--v5m-page-pad); font-size: var(--v5-font-size-caption);
    font-weight: 600; background: var(--v5-color-surface); }
  .v5m-statusbar__icons { display: flex; gap: 4px; align-items: center; }

  /* 顶栏 44：logo + 产品名 + 右操作 */
  .v5m-topbar { height: var(--v5m-topbar-height); flex: none; display: flex; align-items: center;
    gap: var(--v5-space-2); padding: 0 var(--v5m-page-pad); background: var(--v5-color-surface); }
  .v5m-topbar__logo { width: 24px; height: 24px; border-radius: 50%; background: var(--v5-color-brand);
    display: grid; place-items: center; flex: none; }
  .v5m-topbar__title { font-size: var(--v5m-font-size-title); line-height: var(--v5m-line-height-title); font-weight: 600; flex: 1; }
  .v5m-iconbtn { width: 32px; height: 32px; display: grid; place-items: center; border: none; background: transparent;
    border-radius: var(--v5-radius-md); color: var(--v5-color-text); }

  /* 滚动内容区 */
  .v5m-body { flex: 1; overflow-y: auto; padding: var(--v5-space-4) var(--v5m-page-pad); display: flex;
    flex-direction: column; gap: var(--v5-space-4); }
  .v5m-home-cast { width: 100%; height: auto; object-fit: contain; }

  /* 快捷入口行：40 圆角图标 + 12px caption */
  .v5m-quick { display: flex; justify-content: space-between; padding: 0 var(--v5-space-2); }
  .v5m-quick__item { display: flex; flex-direction: column; align-items: center; gap: var(--v5-space-2);
    text-decoration: none; color: var(--v5-color-text); }
  .v5m-quick__ico { width: 40px; height: 40px; border-radius: var(--v5-radius-md); display: grid; place-items: center;
    background: var(--v5-color-info-bg); color: var(--v5-color-brand); }
  .v5m-quick__cap { font-size: 12px; line-height: 16px; }

  /* 区块标题 */
  .v5m-section { font-size: var(--v5-font-size-body); line-height: var(--v5m-line-height-body); font-weight: 600; }

  /* 列表卡：白底扁平，缩略/图标 + 标题 + meta */
  .v5m-card { background: var(--v5-color-surface); border-radius: var(--v5-radius-md); padding: var(--v5-space-3);
    display: flex; gap: var(--v5-space-3); align-items: center; text-decoration: none; color: inherit; }
  .v5m-card__thumb { width: 96px; height: 54px; flex: none; border-radius: var(--v5-radius-sm);
    background: var(--v5-color-fill); border: 1px solid var(--v5-color-border); }
  .v5m-card__bd { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .v5m-card__title { font-size: var(--v5-font-size-body); line-height: var(--v5m-line-height-body); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .v5m-card__meta { font-size: var(--v5-font-size-caption); line-height: 20px; color: var(--v5-color-text-secondary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ================= 底部 TabBar + 安全区（激活项 = 近黑加粗，蓝仅强调） ================= */
  .v5m-tabbar-wrap { flex: none; background: var(--v5-color-surface); border-top: 1px solid var(--v5-color-border); }
  .v5m-tabbar { height: var(--v5m-tabbar-height); display: flex; }
  .v5m-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    text-decoration: none; color: var(--v5-color-text-secondary); position: relative; }
  .v5m-tab__cap { font-size: 10px; line-height: 14px; }
  .v5m-tab--active { color: var(--v5-color-text); }
  .v5m-tab--active .v5m-tab__cap { font-weight: 600; }
  .v5m-tab__badge { position: absolute; top: 2px; left: calc(50% + 6px); min-width: 14px; height: 14px;
    border-radius: var(--v5-radius-pill); background: var(--v5-color-error); color: #fff; font-size: 10px;
    line-height: 14px; text-align: center; padding: 0 3px; }
  .v5m-safe { height: var(--v5m-safe-bottom); display: grid; place-items: center; }
  .v5m-safe::after { content: ""; width: 134px; height: 5px; border-radius: var(--v5-radius-pill);
    background: var(--v5-color-text); }
  svg { display: block; }
</style>
</head>
<body>
  <div class="v5m-screen">
    <!-- 模拟状态栏（演示态） -->
    <div class="v5m-statusbar">
      <span>9:41</span>
      <span class="v5m-statusbar__icons"><svg width="46" height="12" viewBox="0 0 46 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="currentColor"/><rect x="5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="10" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/><path d="M20 4c2-2 6-2 8 0M22 7c1-1 3-1 4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="33" y="1.5" width="11" height="9" rx="2" stroke="currentColor" stroke-width="1"/><rect x="34.5" y="3" width="7" height="6" rx="1" fill="currentColor"/></svg></span>
    </div>

    <!-- ===== SLOT: 顶栏（产品 logo + 产品名 + 右侧操作） ===== -->
    <header class="v5m-topbar">
      <span class="v5m-topbar__logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 22 L15 11 L20 22 Z" fill="#6f8bff"/><path d="M4 22 L11 6 L14 13 Z" fill="#fff"/></svg></span>
      <span class="v5m-topbar__title">大明白 V5</span>
      <button class="v5m-iconbtn" aria-label="搜索"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M17 17l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </header>

    <div class="v5m-body">
      <!-- ===== SLOT: 统一首页群像（固定素材，移动端等比缩放） ===== -->
      <img class="v5m-home-cast" src="../media/home-agent-cast.png" alt="V5 智能助手团队" />

      <!-- ===== SLOT: 快捷入口行（40 圆角图标 + caption，2–4 个） ===== -->
      <div class="v5m-quick">
        <a class="v5m-quick__item"><span class="v5m-quick__ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span><span class="v5m-quick__cap">快捷入口</span></a>
        <a class="v5m-quick__item"><span class="v5m-quick__ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 5h14v11H8l-3 3V5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span><span class="v5m-quick__cap">快捷入口</span></a>
        <a class="v5m-quick__item"><span class="v5m-quick__ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span><span class="v5m-quick__cap">快捷入口</span></a>
        <a class="v5m-quick__item"><span class="v5m-quick__ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="15" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 9h17M8 3.5v3M16 3.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span><span class="v5m-quick__cap">快捷入口</span></a>
      </div>

      <!-- ===== SLOT: 区块标题 ===== -->
      <div class="v5m-section">我的内容</div>

      <!-- ===== SLOT: 入口卡组（业务对象列表；每卡 = 缩略/图标 + 标题 + meta） ===== -->
      <a class="v5m-card">
        <span class="v5m-card__thumb"></span>
        <span class="v5m-card__bd">
          <span class="v5m-card__title">业务对象标题</span>
          <span class="v5m-card__meta">辅助说明 · meta 信息</span>
        </span>
      </a>
      <a class="v5m-card">
        <span class="v5m-card__thumb"></span>
        <span class="v5m-card__bd">
          <span class="v5m-card__title">业务对象标题</span>
          <span class="v5m-card__meta">辅助说明 · meta 信息</span>
        </span>
      </a>
    </div>

    <!-- ===== SLOT: 底部 TabBar（3–5 项，只改激活项与文案） ===== -->
    <div class="v5m-tabbar-wrap">
      <nav class="v5m-tabbar">
        <a class="v5m-tab v5m-tab--active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 10.5 12 4l8 6.5V20h-5.5v-5h-5v5H4v-9.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span class="v5m-tab__cap">首页</span></a>
        <a class="v5m-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H9l-5 4V5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span class="v5m-tab__cap">消息</span><span class="v5m-tab__badge">9</span></a>
        <a class="v5m-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 9h8M8 13h8M8 17h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="v5m-tab__cap">记录</span></a>
        <a class="v5m-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="v5m-tab__cap">我的</span></a>
      </nav>
      <div class="v5m-safe"></div>
    </div>
  </div>
</body>
</html>

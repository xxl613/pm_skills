<!doctype html>
<!-- 页面原型 B-m · 移动端对话流壳层（H5 375×812）
     结构忠于 Figma「大平台设计-UI」教师端 app 群聊/对话 56301:10135（file ljg4eVP3elzzx5b2Q8FYdI）：
       模拟状态栏(44) → 顶栏(44: 返回+居中标题+更多) → 消息流[日期分隔/AI 左/用户右]
       → 底部输入台(胶囊输入+语音+加号) + Home Indicator 安全区(34)。无 TabBar（二级页）。
     视觉走 V5 base 令牌：用户气泡浅灰底+描边（Figma 参考里的品牌蓝气泡属项目主题，由 theme.css 覆盖）。
     新页 copy 本文件，只改顶栏标题与消息内容。桌面端对应壳层：shell/chat-flow.html。 -->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>V5 · 移动对话流 chat-flow</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
    font-family: var(--v5-font-family); color: var(--v5-color-text); background: var(--v5-color-fill); }

  /* ================= 手机画板（375×812，居中展示） ================= */
  .v5m-screen { width: var(--v5m-viewport); min-height: var(--v5m-screen-min); background: var(--v5-color-surface);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    border: 1px solid var(--v5-color-border); }

  /* 模拟状态栏（原型演示态） */
  .v5m-statusbar { height: var(--v5m-statusbar-height); flex: none; display: flex; align-items: center;
    justify-content: space-between; padding: 0 var(--v5m-page-pad); font-size: var(--v5-font-size-caption);
    font-weight: 600; background: var(--v5-color-surface); }
  .v5m-statusbar__icons { display: flex; gap: 4px; align-items: center; }

  /* 顶栏 44：返回 + 居中标题 + 更多 */
  .v5m-topbar { height: var(--v5m-topbar-height); flex: none; display: flex; align-items: center;
    padding: 0 var(--v5-space-2); background: var(--v5-color-surface); }
  .v5m-topbar__title { flex: 1; text-align: center; font-size: var(--v5m-font-size-title);
    line-height: var(--v5m-line-height-title); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .v5m-iconbtn { width: 32px; height: 32px; flex: none; display: grid; place-items: center; border: none;
    background: transparent; border-radius: var(--v5-radius-md); color: var(--v5-color-text); }

  /* ================= 消息流 ================= */
  .v5m-timeline { flex: 1; overflow-y: auto; padding: var(--v5-space-4) var(--v5m-page-pad);
    display: flex; flex-direction: column; gap: var(--v5-space-4); }
  .v5m-time { align-self: center; font-size: 12px; line-height: 16px; color: var(--v5-color-text-secondary); }

  /* AI 消息：头像 36 + 名称行 + 气泡（浅灰底，无描边） */
  .v5m-msg-ai { display: flex; gap: var(--v5-space-2); max-width: 100%; }
  .v5m-msg-ai__avatar { width: 36px; height: 36px; flex: none; border-radius: 50%;
    background: var(--v5-color-fill); border: 1px solid var(--v5-color-border); }
  .v5m-msg-ai__body { display: flex; flex-direction: column; gap: var(--v5-space-1); min-width: 0; }
  /* 消息头：职能化名称（+ 可选状态标签 ⚡），规则同桌面壳层 */
  .v5m-msg-ai__head { display: flex; align-items: baseline; gap: var(--v5-space-2);
    font-size: var(--v5-font-size-caption); }
  .v5m-msg-ai__name { color: var(--v5-color-text-secondary); }
  .v5m-msg-ai__status { color: var(--v5-color-text-tertiary); }
  .v5m-msg-ai__bubble { align-self: flex-start; max-width: 247px; background: var(--v5-color-bg);
    border-radius: var(--v5-radius-md); padding: var(--v5-space-3);
    font-size: var(--v5-font-size-body); line-height: var(--v5m-line-height-body); }

  /* 用户消息：右对齐浅灰底+描边（V5 base；项目可经 theme.css 换品牌色） */
  .v5m-msg-user { align-self: flex-end; max-width: 247px; background: var(--v5-color-bg);
    border: 1px solid var(--v5-color-border); border-radius: var(--v5-radius-md); padding: var(--v5-space-3);
    font-size: var(--v5-font-size-body); line-height: var(--v5m-line-height-body); }

  /* ================= 底部输入台 + 安全区 ================= */
  .v5m-composer-wrap { flex: none; background: var(--v5-color-surface); border-top: 1px solid var(--v5-color-border); }
  .v5m-composer { display: flex; align-items: center; gap: var(--v5-space-2);
    padding: var(--v5-space-2) var(--v5m-page-pad); }
  .v5m-composer__field { flex: 1; height: 40px; display: flex; align-items: center;
    padding: 0 var(--v5-space-4); border-radius: var(--v5-radius-pill); background: var(--v5-color-fill);
    font-size: var(--v5-font-size-caption); color: var(--v5-color-text-disabled); }
  .v5m-safe { height: var(--v5m-safe-bottom); display: grid; place-items: center; }
  .v5m-safe::after { content: ""; width: 134px; height: 5px; border-radius: var(--v5-radius-pill);
    background: var(--v5-color-text); }
  svg { display: block; }
</style>
</head>
<body>
  <div class="v5m-screen">
    <!-- 模拟状态栏（演示态） -->
    <div class="v5m-statusbar">
      <span>9:41</span>
      <span class="v5m-statusbar__icons"><svg width="46" height="12" viewBox="0 0 46 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="currentColor"/><rect x="5" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="10" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/><path d="M20 4c2-2 6-2 8 0M22 7c1-1 3-1 4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="33" y="1.5" width="11" height="9" rx="2" stroke="currentColor" stroke-width="1"/><rect x="34.5" y="3" width="7" height="6" rx="1" fill="currentColor"/></svg></span>
    </div>

    <!-- ===== SLOT: 顶栏（返回 + Agent/会话标题 + 更多） ===== -->
    <header class="v5m-topbar">
      <button class="v5m-iconbtn" aria-label="返回"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4 6.5 10l6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <span class="v5m-topbar__title">V5 小管家</span>
      <button class="v5m-iconbtn" aria-label="更多"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="5" cy="10" r="1.4" fill="currentColor"/><circle cx="10" cy="10" r="1.4" fill="currentColor"/><circle cx="15" cy="10" r="1.4" fill="currentColor"/></svg></button>
    </header>

    <!-- ===== SLOT: 对话内容区（AI 左/用户右；结果卡用 components/chat-result-card.html，
         卡宽随移动列自适应 max-width:100%） ===== -->
    <div class="v5m-timeline">
      <div class="v5m-time">2026-05-06 14:12</div>
      <div class="v5m-msg-ai">
        <div class="v5m-msg-ai__avatar"></div>
        <div class="v5m-msg-ai__body">
          <div class="v5m-msg-ai__head"><span class="v5m-msg-ai__name">V5 小管家</span></div>
          <div class="v5m-msg-ai__bubble">你好，我是 V5 小管家，先跟我说说你想处理的事务吧。<!-- SLOT: AI 返回卡片放这里 --></div>
        </div>
      </div>
      <div class="v5m-msg-user">帮我布置一份第三章的练习题</div>
    </div>

    <!-- ===== SLOT: 底部输入台（胶囊输入 + 语音 + 加号） ===== -->
    <div class="v5m-composer-wrap">
      <div class="v5m-composer">
        <div class="v5m-composer__field">请输入你的问题跟我聊聊～</div>
        <button class="v5m-iconbtn" aria-label="语音"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="7.5" y="3" width="5" height="9" rx="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 9a5 5 0 0 0 10 0M10 14v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <button class="v5m-iconbtn" aria-label="更多输入"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <div class="v5m-safe"></div>
    </div>
  </div>
</body>
</html>
